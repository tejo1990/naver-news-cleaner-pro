name: NNC Pro CI/CD

on:
  push:
    branches: [ master, main ]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: 'latest'

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Build Wasm & Icons
      run: npm run build

    - name: Extract version from manifest
      id: manifest
      run: |
        VERSION=$(node -p "require('./manifest.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Package Extension (Zip)
      run: |
        zip -r nnc-pro-v${{ steps.manifest.outputs.version }}.zip \
          manifest.json \
          popup \
          content \
          background \
          wasm/pkg \
          icons \
          README.md

    - name: Publish to Chrome Web Store
      uses: MobileFirstLLC/cws-publish@latest
      with:
        client_id: ${{ secrets.CHROME_CLIENT_ID }}
        client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
        refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        extension_id: 'leehogagijboandihdigoecpblgnfmld'
        zip_file: nnc-pro-v${{ steps.manifest.outputs.version }}.zip
        action: 'upload'

    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.NOTIFY_EMAIL }}
        password: ${{ secrets.MAIL_PASSWORD || 'NOT_SET' }}
        subject: "NNC Pro Build Result: ${{ job.status }}"
        to: penapllee@gmail.com
        from: NNC Pro CI/CD
        body: |
          NNC Pro (v${{ steps.manifest.outputs.version }}) Build completed.
          Status: ${{ job.status }}
          View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
